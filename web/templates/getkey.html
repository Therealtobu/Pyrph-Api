<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Get Key — Pyrph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--bg1:#0a0a0a;--bg2:#111;--bg3:#1c1c1e;--text:#f5f5f7;--text2:#a1a1a6;--text3:#636366;--accent:#0a84ff;--green:#30d158;--red:#ff453a;--orange:#ff9f0a;--border:rgba(255,255,255,0.07)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
nav{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.85);backdrop-filter:blur(20px)}
.logo{font-size:18px;font-weight:800;color:var(--accent);text-decoration:none}
.back{color:var(--text2);font-size:13px;text-decoration:none;transition:color .2s}
.back:hover{color:var(--text)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:460px}
h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.sub{color:var(--text2);font-size:13px;line-height:1.55;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;resize:none;height:80px;outline:none;transition:border-color .2s;line-height:1.5}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text3)}
.hint{background:rgba(10,132,255,.07);border:1px solid rgba(10,132,255,.15);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text2);line-height:1.55}
.hint code{font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,.5);padding:3px 7px;border-radius:5px;font-size:12px;color:var(--green);display:block;margin-top:8px}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:var(--accent);color:#fff;margin-top:14px;transition:all .2s}
.btn:hover{opacity:.87}
.btn:disabled{opacity:.4;cursor:not-allowed}
.result{display:none;margin-top:20px}
.result.show{display:block}
.rlabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.rbox{background:var(--bg2);border:1px solid rgba(48,209,88,.2);border-radius:10px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--green);word-break:break-all;text-align:center;letter-spacing:.5px}
.rexp{font-size:12px;color:var(--text3);margin-top:8px;text-align:center}
.cpbtn{width:100%;margin-top:10px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.cpbtn:hover{color:var(--text);background:var(--bg2)}
.next-steps{background:var(--bg2);border-radius:10px;padding:14px 16px;margin-top:14px;font-size:13px;color:var(--text2);line-height:1.7}
.next-steps code{font-family:'JetBrains Mono',monospace;background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--green)}
.err{color:var(--red);font-size:13px;margin-top:12px;display:none;padding:10px 14px;background:rgba(255,69,58,.08);border-radius:8px;border:1px solid rgba(255,69,58,.15)}
.err.show{display:block}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Pyrph</a>
  <a href="/" class="back">← Home</a>
</nav>
<div class="wrap">
  <div class="card">
    <h1>Get Free Key</h1>
    <p class="sub">One free obfuscation per key. Renew anytime. No account needed.</p>

    <label>Your HWID</label>
    <textarea id="hwid" placeholder="Paste your HWID here...&#10;(Run pyrph in terminal to see it)"></textarea>

    <div class="hint">
      Get your HWID by running:
      <code>pyrph</code>
      It will display your HWID on screen. Copy and paste it above.
    </div>

    <button class="btn" id="gbtn" onclick="getKey()">Generate Free Key</button>
    <div class="err" id="err"></div>

    <div class="result" id="result">
      <div class="rlabel">Your Key</div>
      <div class="rbox" id="kbox"></div>
      <div class="rexp" id="kexp"></div>
      <button class="cpbtn" onclick="copy()">Copy Key</button>
      <div class="next-steps">
        <strong>Next steps:</strong><br>
        1. Activate: <code>pyrph --activate YOUR-KEY</code><br>
        2. Run: <code>pyrph</code><br>
        3. Enter your .py file when prompted
      </div>
    </div>
  </div>
</div>

<script>
let _key = '';
async function getKey() {
  const hwid = document.getElementById('hwid').value.trim();
  const err  = document.getElementById('err');
  const res  = document.getElementById('result');
  const btn  = document.getElementById('gbtn');
  err.classList.remove('show'); res.classList.remove('show');
  if (hwid.length < 8) { err.textContent='Please enter a valid HWID.'; err.classList.add('show'); return; }
  btn.disabled=true; btn.textContent='Generating...';
  try {
    const r = await fetch('/api/getkey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hwid})});
    const d = await r.json();
    if (d.ok) {
      _key = d.key;
      document.getElementById('kbox').textContent = d.key;
      document.getElementById('kexp').textContent = d.expires_at ? `Expires: ${new Date(d.expires_at+'Z').toLocaleString()} · 1 use` : '';
      res.classList.add('show');
    } else {
      err.textContent = d.detail || d.error || 'Failed.';
      err.classList.add('show');
    }
  } catch(e) { err.textContent='Cannot connect to server.'; err.classList.add('show'); }
  btn.disabled=false; btn.textContent='Generate Free Key';
}
function copy() {
  navigator.clipboard?.writeText(_key).then(()=>{
    const b=document.querySelector('.cpbtn'); b.textContent='✓ Copied!';
    setTimeout(()=>b.textContent='Copy Key',2000);
  });
}
</script>
</body>
</html>
